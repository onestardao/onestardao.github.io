<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WFGY Redirect</title>

  <script>
    /*
      EDIT ONLY THIS ONE VALUE
    */
    const TARGET_URL = "https://github.com/onestardao/WFGY/blob/main/OS/BlahBlahBlah/README.md";

    const REDIRECT_DELAY_MS = 1000;

    function goToTarget() {
      try {
        window.location.replace(TARGET_URL);
      } catch (error) {
        window.location.href = TARGET_URL;
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      const manualLink = document.getElementById("manual-link");
      const targetText = document.getElementById("target-url");

      if (manualLink) {
        manualLink.href = TARGET_URL;
      }

      if (targetText) {
        targetText.textContent = TARGET_URL;
      }

      window.setTimeout(goToTarget, REDIRECT_DELAY_MS);
    });
  </script>

  <noscript>
    <meta http-equiv="refresh" content="1; url=https://github.com/onestardao/WFGY/blob/main/OS/BlahBlahBlah/README.md" />
  </noscript>

  <style>
    :root {
      color-scheme: dark;
      --bg: #050708;
      --bg2: #0a0f12;
      --panel: rgba(8, 12, 14, 0.86);
      --line: rgba(150, 190, 210, 0.18);
      --line-strong: rgba(150, 190, 210, 0.28);
      --text: #d7e7ee;
      --muted: rgba(215, 231, 238, 0.62);
      --accent: #9fd3ff;
      --accent-soft: rgba(159, 211, 255, 0.18);
      --glow: rgba(159, 211, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(1000px 420px at 50% 12%, var(--glow), transparent 60%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      color: var(--text);
      font-family:
        ui-monospace,
        SFMono-Regular,
        Menlo,
        Monaco,
        Consolas,
        "Liberation Mono",
        "Courier New",
        monospace;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.015) 0,
          rgba(255, 255, 255, 0.015) 1px,
          transparent 1px,
          transparent 4px
        );
      opacity: 0.22;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(920px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 22px 20px 18px;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.3) inset,
        0 20px 60px rgba(0, 0, 0, 0.35);
      animation: panelIn 220ms ease-out both;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status {
      color: var(--muted);
      font-size: 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.02);
    }

    .command {
      margin: 0;
      font-size: clamp(32px, 6vw, 72px);
      line-height: 1.06;
      color: var(--text);
      letter-spacing: -0.03em;
      text-shadow: 0 0 18px rgba(159, 211, 255, 0.08);
      animation: textIn 260ms ease-out both;
    }

    .prompt {
      color: var(--accent);
    }

    .cursor {
      display: inline-block;
      margin-left: 8px;
      color: var(--accent);
      animation: blink 900ms steps(1, end) infinite;
      transform: translateY(-0.04em);
    }

    .sub {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      animation: textIn 320ms ease-out both;
    }

    .progress {
      margin-top: 18px;
      height: 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.02);
    }

    .progress > div {
      height: 100%;
      width: 28%;
      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(159, 211, 255, 0.55),
          transparent
        );
      animation: scan 1000ms linear infinite;
    }

    .meta {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      opacity: 0.55;
    }

    .links {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      align-items: center;
      font-size: 13px;
    }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px dotted var(--line-strong);
    }

    a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .target {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
    }

    .target strong {
      color: var(--text);
      font-weight: 600;
    }

    @keyframes blink {
      0%, 49% {
        opacity: 1;
      }
      50%, 100% {
        opacity: 0;
      }
    }

    @keyframes scan {
      0% {
        transform: translateX(-90%);
      }
      100% {
        transform: translateX(310%);
      }
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes textIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .panel {
        padding: 18px 16px 16px;
      }

      .topline {
        margin-bottom: 14px;
        padding-bottom: 10px;
      }

      .sub {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="panel" role="main" aria-label="WFGY redirect page">
      <div class="topline">
        <div class="label">WFGY CLI LAYER</div>
        <div class="status">redirect layer active</div>
      </div>

      <h1 class="command">
        <span class="prompt">&gt;</span> wfgy redirect<span class="cursor">_</span>
      </h1>

      <p class="sub">resolving target route...</p>

      <div class="progress" aria-hidden="true">
        <div></div>
      </div>

      <div class="meta">
        <span>auto redirect in 1.0s</span>
        <span class="dot">•</span>
        <span>verification-first routing</span>
      </div>

      <div class="links">
        <a id="manual-link" href="#">continue manually</a>
        <span class="dot">•</span>
        <a href="https://onestardao.github.io/">back to home</a>
      </div>

      <div class="target">
        <strong>target:</strong>
        <span id="target-url"></span>
      </div>
    </main>
  </div>
</body>
</html>
